<!DOCTYPE html>
<!--
  Auto Assault VFX viewer — browse *_nfx.xml particle effects and preview in Three.js.
  Serve the REPO ROOT over HTTP:
      python -m http.server 8080
  then open http://localhost:8080/tools/model-viewer/vfx.html
  Regenerate the index after (re)extracting assets:
      python tools/build_vfx_index.py
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>AutoCore VFX Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0e1218; --panel: #161b24; --panel2: #1c232f; --line: #28303d;
    --text: #cdd6e4; --dim: #7c8798; --accent: #5b9dff; --warn: #ffb02e;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; background: var(--bg); color: var(--text);
    font: 13px/1.45 "Segoe UI", system-ui, sans-serif; overflow: hidden;
  }
  #sidebar {
    width: 320px; min-width: 320px; height: 100%; display: flex; flex-direction: column;
    background: var(--panel); border-right: 1px solid var(--line);
  }
  #sidebar header { padding: 10px 12px 6px; }
  #sidebar h1 { margin: 0 0 8px; font-size: 15px; font-weight: 600; color: #e8eef8; }
  #search {
    width: 100%; padding: 6px 9px; border-radius: 6px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--text); outline: none;
  }
  #search:focus { border-color: var(--accent); }
  #count { color: var(--dim); font-size: 11px; padding: 4px 2px 0; }
  #category-bar {
    padding: 6px 10px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .chip {
    padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--dim); font-size: 11px; cursor: pointer;
  }
  .chip:hover { color: var(--text); border-color: var(--accent); }
  .chip.active { background: #24446e; color: #fff; border-color: #3a6db8; }
  #effect-list {
    flex: 1; overflow-y: auto; margin: 0; padding: 4px 0; list-style: none; min-height: 0;
  }
  #effect-list li {
    padding: 3px 12px; cursor: pointer; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; font-family: Consolas, monospace; font-size: 12px;
  }
  #effect-list li:hover { background: var(--panel2); }
  #effect-list li.active { background: #24446e; color: #fff; }
  #effect-list li.more { color: var(--dim); cursor: default; font-style: italic; }
  #detail-rail {
    width: 360px; min-width: 360px; height: 100%; display: flex; flex-direction: column;
    background: var(--panel); border-right: 1px solid var(--line); overflow: hidden;
  }
  #detail-rail header { padding: 10px 12px 6px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  #detail-rail h2 { margin: 0; font-size: 13px; font-weight: 600; color: #e8eef8; word-break: break-all; }
  #detail-meta { color: var(--dim); font-size: 11px; margin-top: 4px; }
  #detail-scroll { flex: 1; overflow-y: auto; padding: 8px 12px 12px; min-height: 0; }
  #detail-scroll .row { margin: 4px 0; font-size: 12px; }
  #detail-scroll .k { color: var(--dim); display: inline-block; min-width: 88px; }
  #detail-scroll .warn { color: var(--warn); }
  #detail-scroll details { margin-top: 8px; }
  #detail-scroll summary { cursor: pointer; color: var(--dim); font-size: 11px; user-select: none; }
  #detail-scroll pre {
    margin: 6px 0 0; padding: 8px; background: var(--panel2); border: 1px solid var(--line);
    border-radius: 6px; font-size: 10px; overflow-x: auto; max-height: 280px;
    white-space: pre-wrap; word-break: break-word;
  }
  #main { flex: 1; position: relative; height: 100%; min-width: 0; }
  #canvas-wrap { position: absolute; inset: 0; }
  #canvas-wrap canvas { display: block; }
  #playback-bar {
    position: absolute; top: 12px; left: 12px; right: 12px; z-index: 4;
    display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px;
    background: rgba(22, 27, 38, 0.95); border: 1px solid var(--line); border-radius: 8px;
    padding: 6px 12px; font-size: 12px;
  }
  #playback-bar label { color: var(--dim); display: inline-flex; align-items: center; gap: 4px; }
  #playback-bar select, #playback-bar button {
    background: var(--panel2); color: var(--text); border: 1px solid var(--line);
    border-radius: 5px; padding: 3px 8px; font: inherit; cursor: pointer;
  }
  #playback-bar button:hover { border-color: var(--accent); }
  #event-select { min-width: 120px; }
  #speed { width: 100px; accent-color: var(--accent); }
  #status {
    position: absolute; top: 62px; left: 50%; transform: translateX(-50%);
    background: rgba(22, 27, 38, 0.95); border: 1px solid var(--line); border-radius: 8px;
    padding: 5px 14px; font-size: 12px; z-index: 4;
  }
  #status:empty { display: none; }
  #status.error { color: #ff7b72; border-color: #6e2c2c; }
  #hint {
    position: absolute; right: 12px; bottom: 12px; color: var(--dim); font-size: 11px;
    pointer-events: none; text-align: right;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.165.0",
    "three/addons/": "https://esm.sh/three@0.165.0/examples/jsm/"
  }
}
</script>
</head>
<body>
  <aside id="sidebar">
    <header>
      <h1>AutoCore VFX Viewer</h1>
      <input id="search" type="search" placeholder="Search effects…  (press /)" autocomplete="off">
      <div id="count"></div>
    </header>
    <div id="category-bar"></div>
    <ul id="effect-list"></ul>
  </aside>
  <aside id="detail-rail">
    <header>
      <h2 id="detail-title">Select an effect</h2>
      <div id="detail-meta"></div>
    </header>
    <div id="detail-scroll"></div>
  </aside>
  <main id="main">
    <div id="canvas-wrap"></div>
    <div id="playback-bar">
      <button type="button" id="btn-play" title="Play / Pause">Pause</button>
      <button type="button" id="btn-restart">Restart</button>
      <label>Event <select id="event-select" disabled></select></label>
      <label>Speed <input id="speed" type="range" min="0.1" max="3" step="0.1" value="1"></label>
      <span id="speed-value">1.0×</span>
      <label><input type="checkbox" id="show-geo"> geo companion</label>
    </div>
    <div id="status"></div>
    <div id="hint">drag: orbit · wheel: zoom · right-drag: pan</div>
  </main>
  <script type="module" src="./vfx.js"></script>
</body>
</html>
